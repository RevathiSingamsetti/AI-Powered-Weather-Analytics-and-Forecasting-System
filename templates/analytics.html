<!DOCTYPE html>
<html>

<head>

<title>Analytics</title>

<link rel="stylesheet" href="/static/style.css">

<style>

.hero{

text-align:center;

margin-bottom:40px;

}

.hero h1{

color:#222;

font-size:40px;

margin-bottom:10px;

}

.hero p{

color:#666;

font-size:18px;

}

.chart{

background:white;

padding:25px;

border-radius:20px;

margin-top:40px;

text-align:center;

box-shadow:0 5px 20px rgba(0,0,0,.08);

}

.chart h2{

color:#222;

margin-bottom:20px;

}

</style>

</head>

<body>

<div class="container">

<div class="hero">

<h1>

📊 Weather Analytics

</h1>

<p>

Smart Weather Statistics Dashboard

</p>

</div>

<div class="details">

<div class="detail-card">

🔍

<h3>

Total Searches

</h3>

<h2>

{{ total }}

</h2>

</div>

<div class="detail-card">

🔥

<h3>

Highest Temp

</h3>

<h2>

{{ highest }}°C

</h2>

</div>

<div class="detail-card">

🌡

<h3>

Average Temp

</h3>

<h2>

{{ average }}°C

</h2>

</div>

</div>

<div class="chart">

<h2>

Temperature Trend

</h2>

<img

src="/static/chart.png"

style="width:100%;max-width:850px;border-radius:15px;"

>

</div>

</div>

</body>

</html>
